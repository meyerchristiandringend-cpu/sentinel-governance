template_id: t1110-password-spray
technique: T1110
name: Password Spray
base_query: |
  {{table}}
  | where {{result_field}} != {{success_code}}
  | summarize fail_count=count() by {{identity_field}}, bin(TimeGenerated, {{window}})
  | where fail_count >= {{threshold}}
parameters:
  window:
    type: string
    default: 15m
  threshold:
    type: number
    default: 10
bindings:
  - source: entra-id
    mapping:
      table: SigninLogs
      result_field: ResultType
      success_code: 0
      identity_field: UserPrincipalName
  - source: vpn
    mapping:
      table: CommonSecurityLog
      result_field: DeviceAction
      success_code: "Allow"
      identity_field: SourceUserName
