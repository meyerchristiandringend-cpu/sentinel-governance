name: Governance SLO Enforcement

on:
  pull_request:
    branches: [main]
    paths:
      - 'governance/**'
      - '.github/workflows/**'
      - 'tools/**'
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  governance-slo-enforcement:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run governance SLO checks
        id: slo
        shell: bash
        run: |
          set +e
          python tools/check_governance_slos.py --repo . --json-out governance/slo-report.json --md-out governance/slo-report.md
          RC=$?
          echo "exit_code=$RC" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Add SLO report to step summary
        shell: bash
        run: |
          cat governance/slo-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SLO report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governance-slo-report
          path: |
            governance/slo-report.json
            governance/slo-report.md

      - name: Comment SLO report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('governance/slo-report.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Enforce SLO gate
        shell: bash
        run: |
          RC='${{ steps.slo.outputs.exit_code }}'
          if [ "$RC" = "2" ]; then
            echo "SLO failure detected (exit 2). Blocking workflow."
            exit 2
          fi
          if [ "$RC" = "1" ]; then
            echo "SLO warnings detected (exit 1). Not blocking, review required."
            exit 0
          fi
          echo "All governance SLO checks passed."
