name: Governance Integrity

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/CODEOWNERS'
      - '.github/workflows/**'
      - 'governance/**'
      - 'tools/**'

permissions:
  contents: read

jobs:
  governance-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run governance integrity checks
        run: python tools/check_governance_integrity.py .
