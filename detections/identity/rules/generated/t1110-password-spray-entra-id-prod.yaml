id: t1110-password-spray-entra-id-prod
name: T1110 Password Spray - Entra ID
query: 'fn_identity_failed_logins_v1()

  | where Result != ''Success''

  | summarize failures = count(), cnt = count() by UserPrincipalName, bin(TimeGenerated,
  5m)

  | where failures > 10'
apiVersion: v1
kind: scheduledRule
metadata:
  name: t1110-password-spray-entra-id-prod
  displayName: T1110 Password Spray - Entra ID
  owner:
    slack: '#soc-detections'
    oncall: sec-detect-oncall
    team: identity-detection
  domain: identity
  lifecycle: production
  version: 2
  mitre_techniques:
  - T1110
  pack: identity
  stable_id: 4c7e510a-4a73-f03c-6d08-f7bc4de5dcfa
entities:
- type: Account
  field: UserPrincipalName
spec:
  query:
    sourceFunction: fn_identity_failed_logins_v1
    where: Result != 'Success'
    reduce: summarize failures = count(), cnt = count() by UserPrincipalName, bin(TimeGenerated,
      5m)
    threshold:
      operator: GreaterThan
      value: 10
      metric: failures
  schedule:
    frequency: PT5M
    lookback: PT5M
  incident:
    severity: Medium
    createIncident: true
    grouping:
      enabled: true
      lookback: PT1H
      byEntities:
      - User
  suppression:
    enabled: true
    duration: PT1H
  enabled: true
  environments:
  - name: prod
    enabled: true
metadata_ext:
  entityMappings:
  - entityType: Account
    fieldMappings:
    - identifier: FullName
      columnName: UserPrincipalName
