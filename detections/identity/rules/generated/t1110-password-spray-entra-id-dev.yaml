id: t1110-password-spray-entra-id-dev
name: T1110 Password Spray - Entra ID
query: 'fn_identity_failed_logins_v1()

  | where Result != ''Success''

  | summarize failures = count(), cnt = count() by UserPrincipalName, bin(TimeGenerated,
  5m)

  | where cnt > 10'
apiVersion: v1
kind: scheduledRule
metadata:
  name: t1110-password-spray-entra-id-dev
  displayName: T1110 Password Spray - Entra ID
  owner:
    slack: '#soc-detections'
    oncall: sec-detect-oncall
    team: identity-detection
  domain: identity
  lifecycle: production
  version: 2
  mitre_techniques:
  - T1110
  pack: identity
  stable_id: 840f7524-64bc-7e3e-83d3-a561e745c46d
entities:
- type: Account
  field: UserPrincipalName
spec:
  query:
    sourceFunction: fn_identity_failed_logins_v1
    where: Result != 'Success'
    reduce: summarize failures = count(), cnt = count() by UserPrincipalName, bin(TimeGenerated,
      5m)
    threshold:
      operator: GreaterThan
      value: 10
      metric: cnt
  schedule:
    frequency: PT15M
    lookback: PT1H
  incident:
    severity: Medium
    createIncident: false
    grouping:
      enabled: true
      lookback: PT2H
      byEntities:
      - User
  suppression:
    enabled: false
  enabled: true
  environments:
  - name: dev
    enabled: true
metadata_ext:
  entityMappings:
  - entityType: Account
    fieldMappings:
    - identifier: FullName
      columnName: UserPrincipalName
