id: t1110-password-spray-entra-id
name: Password Spray (entra-id)
query: |
  SigninLogs
  | where ResultType != 0
  | summarize fail_count=count() by UserPrincipalName, bin(TimeGenerated, 15m)
  | where fail_count >= 10
metadata:
  name: Password Spray (entra-id)
  template_id: t1110-password-spray
  source: entra-id
  mitre_techniques:
    - T1110
  owner:
    team: detection-engineering
    slack: "#soc-detections"
    oncall: sec-detect-oncall
