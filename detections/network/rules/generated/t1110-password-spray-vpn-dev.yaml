id: t1110-password-spray-vpn-dev
name: T1110 Password Spray - VPN
query: 'fn_network_vpn_auth_failures_v1()

  | where Result == ''Failure''

  | summarize cnt = count() by SrcIP, bin(TimeGenerated, 5m)

  | where cnt > 10'
apiVersion: v1
kind: scheduledRule
metadata:
  name: t1110-password-spray-vpn-dev
  displayName: T1110 Password Spray - VPN
  owner:
    slack: '#soc-detections'
    oncall: sec-detect-oncall
    team: identity-detection
  domain: network
  lifecycle: experimental
  version: 2
  mitre_techniques:
  - T1110
  pack: network
  stable_id: 556c1a01-61a6-2585-ea4a-63a43b98451c
entities:
- type: Ip
  field: SrcIP
spec:
  query:
    sourceFunction: fn_network_vpn_auth_failures_v1
    where: Result == 'Failure'
    reduce: summarize cnt = count() by SrcIP, bin(TimeGenerated, 5m)
    threshold:
      operator: GreaterThan
      value: 10
      metric: cnt
  schedule:
    frequency: PT15M
    lookback: PT1H
  incident:
    severity: Medium
    createIncident: false
    grouping:
      enabled: true
      lookback: PT2H
      byEntities:
      - User
  suppression:
    enabled: false
  enabled: true
  environments:
  - name: dev
    enabled: true
metadata_ext:
  entityMappings:
  - entityType: Ip
    fieldMappings:
    - identifier: Address
      columnName: SrcIP
